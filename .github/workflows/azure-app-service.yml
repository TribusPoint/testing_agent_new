# Deploy the unified Docker image (Next.js + FastAPI) to Azure App Service (Linux container).
# Prerequisites: Azure resources + GitHub secrets — see docs/azure-app-service.md

name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: testing-agent

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push Docker image
        run: |
          REG="${{ secrets.ACR_LOGIN_SERVER }}"
          TAG="${{ github.sha }}"
          docker build -f Dockerfile \
            -t "${REG}/${{ env.IMAGE_NAME }}:${TAG}" \
            -t "${REG}/${{ env.IMAGE_NAME }}:latest" \
            .
          docker push "${REG}/${{ env.IMAGE_NAME }}:${TAG}"
          docker push "${REG}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy container to Web App
        run: |
          REG="${{ secrets.ACR_LOGIN_SERVER }}"
          TAG="${{ github.sha }}"
          IMAGE="${REG}/${{ env.IMAGE_NAME }}:${TAG}"
          az webapp config container set \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --docker-custom-image-name "${IMAGE}" \
            --docker-registry-server-url "https://${REG}" \
            --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
            --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"
          az webapp restart \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"
